{% extends "base.html" %}
{% block title %}Registrazione{% endblock %}
{% block content %}
<div class="u-card-form">
  <div style="text-align:center;padding:28px 0 20px;">
    <div style="font-size:48px;margin-bottom:8px;">🌍</div>
    <h2 style="font-family:var(--font-d);font-size:26px;font-weight:700;color:white;">Crea account</h2>
    <div class="u-muted-sm">Fanta Mondiali 2026</div>
  </div>
  {% if errore %}<div class="flash-danger">{{ errore }}</div>{% endif %}
  <form method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div style="margin-bottom:14px;">
      <label class="fsa-label">Nome utente</label>
      <input type="text" name="nome_utente" class="fsa-input" placeholder="Il tuo nome nel gruppo" required>
    </div>
    <div style="margin-bottom:14px;">
      <label class="fsa-label">Password</label>
      <input type="password" name="password" class="fsa-input" placeholder="Almeno 6 caratteri" required>
    </div>
    <div style="margin-bottom:20px;">
      <label class="fsa-label">Email <span style="color:var(--muted);font-weight:400;">(opzionale — per reminder partite)</span></label>
      <input type="email" name="email" class="fsa-input" placeholder="tuaemail@esempio.com">
      <div class="u-muted-xs" style="margin-top:4px;">Se inserita, riceverai un reminder 2 ore prima delle partite</div>
    </div>
    <button type="submit" class="btn-gold" style="width:100%;justify-content:center;padding:14px;font-size:17px;">
      Registrati →
    </button>
  </form>
  <div style="text-align:center;margin-top:16px;">
    <a href="{{ url_for('auth.login') }}" style="color:var(--azzurro);font-size:14px;text-decoration:none;">Hai già un account? Accedi</a>
  </div>
</div>
{% endblock %}
