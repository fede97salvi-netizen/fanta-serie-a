{% extends "base.html" %}
{% block title %}Email Utenti{% endblock %}
{% block content %}
<div class="page-header">
  <a href="{{ url_for('admin.admin_home') }}" class="u-muted-xs" style="text-decoration:none;">← Admin</a>
  <h2>📧 Email Utenti</h2>
</div>
<div style="padding:0 16px;">
<form method="post">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="fsa-card" style="padding:0;">
    {% for u in utenti %}
    <div style="padding:10px 14px;border-bottom:1px solid var(--border);{% if loop.last %}border-bottom:none;{% endif %}">
      <label class="fsa-label" style="margin-bottom:4px;">{{ u.nome_utente }}</label>
      <input type="email" name="email_{{ u.id }}" value="{{ u.email or '' }}" class="fsa-input"
             style="font-size:14px;" placeholder="email@esempio.com">
    </div>
    {% endfor %}
  </div>
  <button type="submit" class="btn-primary" style="width:100%;justify-content:center;padding:13px;margin-top:12px;">💾 Salva email</button>
</form>
</div>
{% endblock %}
