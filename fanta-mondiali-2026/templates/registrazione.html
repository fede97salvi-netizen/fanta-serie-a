{% extends "base.html" %}
{% block content %}
<div class="u-card-form">
  <div class="fsa-card">
    <div class="u-center-mb">
      <div class="u-icon-xxl">⚽</div>
      <h1 class="u-hero-xl">Registrati</h1>
    </div>
    {% if errore %}
      <div class="alert alert-danger">{{ errore }}</div>
    {% endif %}
    <form method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label class="form-label">Nome Utente</label>
        <input type="text" name="nome_utente" class="form-control" autocomplete="username" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" autocomplete="new-password" required>
      </div>
      <button type="submit" class="btn-success">Crea account</button>
    </form>
    <p class="u-muted-md u-mt-lg" style="text-align:center;">
      Hai già un account? <a href="{{ url_for('auth.login') }}" style="color:var(--azzurro);text-decoration:none;">Accedi qui</a>
    </p>
  </div>
</div>
{% endblock %}
