services:
  - type: web
    name: fanta-serie-a
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fanta-serie-a-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FOOTBALL_API_KEY
        sync: false       # imposta a mano nella dashboard di Render
      - key: RESEND_API_KEY
        sync: false
      - key: APP_URL
        sync: false
      - key: EMAIL_FROM_ADDRESS
        sync: false

databases:
  - name: fanta-serie-a-db
    databaseName: fantaseriea
    plan: free
