services:
  - type: web
    name: fanta-serie-a
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fanta-serie-a-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: fanta-serie-a-db
    databaseName: fantaseriea
    plan: free
