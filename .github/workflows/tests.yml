name: Tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Installa dipendenze
        run: pip install -r requirements.txt
      - name: Esegui i test
        env:
          SECRET_KEY: ci-test-key   # forza SQLite (nessun DATABASE_URL)
        run: pytest -q
