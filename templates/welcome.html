{% extends "base.html" %}
{% block content %}
<div style="background: linear-gradient(160deg, var(--blue) 0%, var(--green-dark) 60%, var(--bg) 100%); padding: 48px 24px 40px; text-align: center; position: relative; overflow: hidden;">
  <div style="position:absolute;top:-40px;right:-40px;width:200px;height:200px;border-radius:50%;background:rgba(0,144,212,0.1);"></div>
  <div style="position:absolute;bottom:-20px;left:-20px;width:120px;height:120px;border-radius:50%;background:rgba(26,107,46,0.15);"></div>
  <div style="font-size:48px;margin-bottom:16px;">🏆</div>
  <h1 style="font-family:var(--font-d);font-size:36px;font-weight:700;color:white;margin-bottom:10px;letter-spacing:1px;">FantaSerieA</h1>
  <p style="font-size:16px;color:rgba(255,255,255,0.7);max-width:300px;margin:0 auto 32px;">Il gioco di pronostici sul campionato italiano. Sfida i tuoi amici ogni weekend.</p>
  <div style="display:flex;flex-direction:column;gap:12px;max-width:280px;margin:0 auto;">
    <a href="{{ url_for('registrazione') }}" class="btn-success" style="font-size:16px;">Registrati e inizia a giocare</a>
    <a href="{{ url_for('login') }}" class="btn-secondary" style="justify-content:center;">Hai già un account? Accedi</a>
  </div>
</div>
{% endblock %}
