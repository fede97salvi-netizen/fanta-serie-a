{% extends "base.html" %}
{% block content %}
<div class="page-header"><span class="page-title">Gestione email utenti</span></div>
<div class="fsa-section u-pt-sm">
  <div class="alert alert-info">Inserisci le email degli utenti esistenti. Lascia vuoto per non modificare.</div>
  <div class="fsa-card u-p-0">
    <form method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      {% for utente in utenti %}
      <div style="display:grid;grid-template-columns:120px 1fr;gap:10px;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border);">
        <div style="font-weight:600;font-size:14px;">{{ utente['nome_utente'] }}</div>
        <input type="email" name="email_{{ utente['id'] }}" class="form-control u-h38" style="font-size:13px;"
          value="{{ utente['email'] or '' }}"
          placeholder="email@esempio.com">
      </div>
      {% endfor %}
      <div style="padding:14px 16px;">
        <button type="submit" class="btn-success">Salva tutte le email</button>
      </div>
    </form>
  </div>
  <a href="{{ url_for('admin.admin_home') }}" class="btn-secondary u-mt-sm">← Dashboard</a>
</div>
{% endblock %}
