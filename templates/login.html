{% extends "base.html" %}
{% block content %}
<div style="max-width:400px;margin:32px auto;padding:0 16px;">
  <div class="fsa-card">
    <div style="text-align:center;margin-bottom:24px;">
      <div style="font-size:32px;margin-bottom:8px;">🔐</div>
      <h1 style="font-family:var(--font-d);font-size:26px;font-weight:700;">Accedi</h1>
    </div>
    {% if errore %}
      <div class="alert alert-danger">{{ errore }}</div>
    {% endif %}
    <form method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label class="form-label">Nome Utente</label>
        <input type="text" name="nome_utente" class="form-control" autocomplete="username" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" autocomplete="current-password" required>
      </div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:20px;">
        <input type="checkbox" name="remember" id="remember" style="width:18px;height:18px;accent-color:var(--azzurro);">
        <label for="remember" style="font-size:14px;color:var(--muted);">Resta collegato</label>
      </div>
      <button type="submit" class="btn-success">Accedi</button>
    </form>
    <p style="text-align:center;margin-top:16px;font-size:14px;color:var(--muted);">
      Non hai un account? <a href="{{ url_for('auth.registrazione') }}" style="color:var(--azzurro);text-decoration:none;">Registrati qui</a>
    </p>
  </div>
</div>
{% endblock %}
