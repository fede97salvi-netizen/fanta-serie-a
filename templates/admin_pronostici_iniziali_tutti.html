{% extends "base.html" %}
{% block content %}
<div class="page-header"><span class="page-title">Tutti i pronostici iniziali</span></div>
<div class="fsa-section u-pt-sm">
  <div class="fsa-card u-p-0">
    <div class="overflow-x">
      <table class="fsa-table">
        <thead><tr><th class="u-pl-sm">Utente</th><th>1°</th><th>2°</th><th>3°</th><th>4°</th><th>Capocannoniere</th></tr></thead>
        <tbody>
          {% for p in pronostici %}
          <tr>
            <td class="u-pl-sm"><strong>{{ p.nome_utente }}</strong></td>
            <td>{{ p.squadra_1 }}</td><td>{{ p.squadra_2 }}</td><td>{{ p.squadra_3 }}</td><td>{{ p.squadra_4 }}</td>
            <td>{{ p.capocannoniere }}</td>
          </tr>
          {% else %}
          <tr><td colspan="6" class="u-card-empty">Nessun pronostico.</td></tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</div>
{% endblock %}
