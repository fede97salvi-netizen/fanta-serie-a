{% extends "base.html" %}
{% block content %}
<div class="page-header"><span class="page-title">Tutti i pronostici</span><span class="page-subtitle">iniziali</span></div>
<div class="fsa-section" style="padding-top:8px;">
  <div class="fsa-card" style="padding:0;">
    <div class="overflow-x">
      <table class="fsa-table">
        <thead><tr><th style="padding-left:14px;">Utente</th><th>1°</th><th>2°</th><th>3°</th><th>4°</th><th>Capocannoniere</th></tr></thead>
        <tbody>
          {% for p in pronostici %}
          <tr>
            <td style="padding-left:14px;"><strong>{{ p.nome_utente }}</strong></td>
            <td>{{ p.squadra_1 }}</td><td>{{ p.squadra_2 }}</td><td>{{ p.squadra_3 }}</td><td>{{ p.squadra_4 }}</td>
            <td>{{ p.capocannoniere }}</td>
          </tr>
          {% else %}
          <tr><td colspan="6" style="text-align:center;color:var(--muted);padding:20px;">Nessun pronostico.</td></tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</div>
{% endblock %}
