{% extends "base.html" %}
{% block content %}
<div class="page-header"><span class="page-title">Tutti i pronostici iniziali</span></div>
<div class="fsa-section u-pt-sm">
  <div class="fsa-card u-p-0">
    <div class="overflow-x">
      <table class="fsa-table" style="table-layout:fixed;max-width:900px;">
        <thead><tr><th class="u-pl-sm" style="width:18%;">Utente</th><th style="width:15%;text-align:center;">1°</th><th style="width:15%;text-align:center;">2°</th><th style="width:15%;text-align:center;">3°</th><th style="width:15%;text-align:center;">4°</th><th style="width:22%;">Capocannoniere</th></tr></thead>
        <tbody>
          {% for p in pronostici %}
          <tr>
            <td class="u-pl-sm"><strong>{{ p.nome_utente }}</strong></td>
            <td style="text-align:center;">{{ p.squadra_1 }}</td><td style="text-align:center;">{{ p.squadra_2 }}</td><td style="text-align:center;">{{ p.squadra_3 }}</td><td style="text-align:center;">{{ p.squadra_4 }}</td>
            <td>{{ p.capocannoniere }}</td>
          </tr>
          {% else %}
          <tr><td colspan="6" class="u-card-empty">Nessun pronostico.</td></tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</div>
{% endblock %}
