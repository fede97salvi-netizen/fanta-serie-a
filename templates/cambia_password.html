{% extends "base.html" %}
{% block content %}
<div style="max-width:400px;margin:32px auto;padding:0 16px;">
  <div class="fsa-card">
    <div style="text-align:center;margin-bottom:24px;">
      <div style="font-size:32px;margin-bottom:8px;">🔑</div>
      <h1 style="font-family:var(--font-d);font-size:26px;font-weight:700;">Cambia Password</h1>
      <p style="font-size:14px;color:var(--muted);margin-top:6px;">Imposta una nuova password per il tuo account.</p>
    </div>
    {% if errore %}
      <div class="alert alert-danger">{{ errore }}</div>
    {% endif %}
    <form method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label class="form-label">Nuova Password</label>
        <input type="password" name="nuova_password" class="form-control" autocomplete="new-password" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Conferma Password</label>
        <input type="password" name="conferma_password" class="form-control" autocomplete="new-password" required>
      </div>
      <button type="submit" class="btn-success">Salva nuova password</button>
    </form>
  </div>
</div>
{% endblock %}
